spring:
  application:
    name: autocheck-backend

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/autocheck}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

  jackson:
    default-property-inclusion: non_null   # omit null fields from all responses
    serialization:
      write-dates-as-timestamps: false      # ISO-8601 strings for Instant/Date
    deserialization:
      fail-on-unknown-properties: false     # tolerate extra fields from clients

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 55MB

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-min-32-chars!!}
    expiration-ms: 86400000  # 24 hours
  ai:
    api-key: ${AI_API_KEY:}
    base-url: ${AI_BASE_URL:https://api.openai.com}
  uploads:
    dir: ${UPLOADS_DIR:/app/uploads}
  docker:
    uploads-volume: ${DOCKER_UPLOADS_VOLUME:auth-check_uploads_data}
    checker-image: ${CHECKER_IMAGE:autocheck-checker:latest}

springdoc:
  api-docs:
    path: /api/docs
  swagger-ui:
    path: /api/swagger-ui.html

logging:
  level:
    root: INFO
    com.team.auth_check: DEBUG
