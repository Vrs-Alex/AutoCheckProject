name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    name: Build & Test Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: autocheck
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Compile
        working-directory: Backend/auth-check
        run: ./gradlew compileKotlin --no-daemon

      - name: Run tests
        working-directory: Backend/auth-check
        env:
          DATABASE_URL: jdbc:postgresql://localhost:5432/autocheck
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-secret-minimum-32-characters-long
          UPLOADS_DIR: /tmp/autocheck-uploads
        run: ./gradlew test --no-daemon

      - name: Build Docker image
        working-directory: Backend/auth-check
        run: docker build -t autocheck-backend:ci .
